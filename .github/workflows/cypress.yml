name: E2E Tests (Cypress)

on:
  push:
    branches: [setup-github-action-configuration]
  pull_request:
    branches: [setup-github-action-configuration]

# Definisikan ENV di tingkat workflow agar tersedia di semua job
env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  CYPRESS_AUTH_SECRET: ${{ secrets.CYPRESS_AUTH_SECRET }}
  CYPRESS_TEST_EMAIL: ${{ secrets.CYPRESS_TEST_EMAIL }}
  CYPRESS_TEST_PASSWORD: ${{ secrets.CYPRESS_TEST_PASSWORD }}
  CYPRESS_PROJECT_ID: ${{ secrets.CYPRESS_PROJECT_ID }}
  CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}

jobs:
  install:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cypress install + build (no tests)
        uses: cypress-io/github-action@v7
        with:
          runTests: false
          build: npm run build
        # Env vars otomatis terpakai dari definisi 'env' di atas

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          if-no-files-found: error

  e2e:
    runs-on: ubuntu-24.04
    needs: install
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      - name: Cypress run (record + parallel)
        uses: cypress-io/github-action@v7
        with:
          start: npm start
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120
          record: true
          parallel: true
          group: "e2e-personal-management"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}