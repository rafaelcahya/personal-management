# App Constants — Single Source of Truth
# Used by: Tester Agent (cypress tests)
# Load in Cypress: cy.fixture('app-constants').then((C) => { ... })
# Never hardcode these values in test files — always reference from here.

# -------------------------------------------------------------------
# Routes (page URLs)
# -------------------------------------------------------------------
routes:
  landing: /main/landing
  inventory: /main/inventory
  trading: /main/trading
  login: /login
  auth_callback: /auth/callback

# -------------------------------------------------------------------
# API Endpoints
# -------------------------------------------------------------------
endpoints:
  auth:
    cypress_login: /api/auth/v1/cypress-login
    logout: /api/auth/v1/logout
    session: /api/auth/v1/session

  inventory:
    list: /api/inventory/v1/list
    create: /api/inventory/v1/create
    update: /api/inventory/v1/update
    delete: /api/inventory/v1/delete
    detail: /api/inventory/v1/detail

  trading:
    list: /api/trading/v1/list
    execute: /api/trading/v1/execute
    cancel: /api/trading/v1/cancel
    detail: /api/trading/v1/detail

  user:
    profile: /api/user/v1/profile
    update_profile: /api/user/v1/update

# -------------------------------------------------------------------
# data-testid Registry
# Add every data-testid here when frontend creates a new component.
# Tester references these — never hardcode testId strings in test files.
# -------------------------------------------------------------------
test_ids:
  # --- Shared / Global ---
  shared:
    submit_btn: submit-btn
    cancel_btn: cancel-btn
    confirm_btn: confirm-btn
    delete_btn: delete-btn
    edit_btn: edit-btn
    close_btn: close-btn
    search_input: search-input
    loading_spinner: loading-spinner
    error_message: error-message
    toast_success: toast-success
    toast_error: toast-error

  # --- Inventory Module ---
  inventory:
    page: inventory-page
    table: inventory-table
    table_row: inventory-table-row
    empty_state: inventory-empty-state
    empty_state_cta: inventory-empty-state-cta
    skeleton: inventory-skeleton
    add_btn: add-item-btn
    row_actions: inventory-row-actions
    row_edit: inventory-row-edit
    row_delete: inventory-row-delete
    dialog: add-item-dialog
    name_input: item-name-input
    stock_input: item-stock-input
    price_input: item-price-input
    name_error: item-name-error
    stock_error: item-stock-error
    price_error: item-price-error
    bulk_action_bar: inventory-bulk-action-bar
    select_all: inventory-select-all
    filter_panel: inventory-filter-panel

  # --- Trading Module ---
  trading:
    page: trading-page
    table: trading-table
    table_row: trading-table-row
    empty_state: trading-empty-state
    skeleton: trading-skeleton
    buy_btn: trade-buy-btn
    sell_btn: trade-sell-btn
    trade_form: trade-form
    symbol_input: trade-symbol-input
    quantity_input: trade-quantity-input
    price_input: trade-price-input
    subtotal: trade-subtotal
    confirm_dialog: trade-confirm-dialog
    symbol_error: trade-symbol-error
    quantity_error: trade-quantity-error
    portfolio_summary: portfolio-summary
    pnl_display: portfolio-pnl

  # --- Auth ---
  auth:
    login_btn: login-btn
    logout_btn: logout-btn
    google_btn: google-oauth-btn
    user_menu: user-menu

# -------------------------------------------------------------------
# Test Data Defaults
# Reusable seed values for test fixtures
# -------------------------------------------------------------------
seed:
  inventory_item:
    name: Test Widget
    stock: 100
    price: 25.99

  trade:
    symbol: BBCA
    quantity: 10
    price: 9500
